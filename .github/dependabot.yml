# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "19:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"
     # Use only security updates
    # see: https://docs.github.com/ja/code-security/dependabot/dependabot-security-updates/customizing-dependabot-security-prs#example-1-configuration-for-security-updates-only
    open-pull-requests-limit: 0
    #ignore:
    #  - dependency-name: "github.com/some/dependency"
    #    versions:
    #      - ">=1.5.0"

